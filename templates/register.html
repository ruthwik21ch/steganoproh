<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Stegano Pro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>🔒 Stegano Pro</h2>
        <p class="subtitle">Create your account</p>

        <form method="POST" action="/register">
            <div class="form-group">
                <label>Full Name</label>
                <input name="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Mobile</label>
                <input name="mobile" placeholder="10-digit mobile number" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>
            <button type="submit" style="margin-top:8px;">Create Account</button>
        </form>

        <a href="/">Already have an account? Sign in</a>
    </div>
</div>

</body>
</html>
